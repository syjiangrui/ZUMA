<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Zuma Prototype</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hud" style="display: none;">
        <p class="eyebrow">Mobile Canvas Prototype</p>
        <h1>祖马原型</h1>
        <p class="status">阶段 1：轨道、炮台、纹理滚动球链</p>
      </section>

      <section id="levelSelect" class="level-select"></section>

      <section class="game-frame">
        <canvas id="gameCanvas" aria-label="Zuma game canvas"></canvas>
        <div id="gameUI" class="game-ui">
          <div id="gameHud" class="game-hud"></div>
          <div id="matchFeedback" class="match-feedback"></div>
          <div id="endCardOverlay" class="end-card-overlay"></div>
        </div>
      </section>
    </main>

    <div class="rotate-hint" aria-hidden="true">
      <div class="rotate-hint__card">
        <div class="rotate-hint__icon">&#8635;</div>
        <p class="rotate-hint__text">请竖屏使用</p>
      </div>
    </div>

    <div id="fadeOverlay" class="fade-overlay"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
