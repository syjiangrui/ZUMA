<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ZUMA 贝塞尔曲线路径编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e1218;color:#ddd;font-family:-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:320px;min-width:320px;background:#161c24;border-right:1px solid #2a3444;display:flex;flex-direction:column;overflow:hidden}
#sidebar-head{padding:12px 16px;border-bottom:1px solid #2a3444}
#sidebar-head h1{color:#f0d57a;font-size:16px;font-family:Georgia}
#sidebar-head .sub{color:#5a6a7a;font-size:11px;margin-top:2px}
.level-tabs{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap;position:relative;z-index:5}
.lv-tab{padding:3px 8px;border-radius:4px;border:1px solid #2a3444;background:#1a222e;color:#6a7a8a;cursor:pointer;font-size:11px;position:relative;z-index:6;pointer-events:auto}
.lv-tab:hover{border-color:#4a5a6a}
.lv-tab.active{color:#f0d57a;border-color:#f0d57a;background:#2a3a50}
#toolbar{display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid #2a3444;flex-wrap:wrap;align-items:center}
.tool-btn{padding:5px 10px;border-radius:6px;border:1px solid #2a3444;background:#1a222e;color:#8a9aaa;cursor:pointer;font-size:12px;transition:all .15s}
.tool-btn:hover{border-color:#4a5a6a;background:#222e3e}
.tool-btn.active{color:#f0d57a;border-color:#f0d57a;background:#2a3a50}
.tool-btn.danger{color:#d45040;border-color:#5a2a2a}
.tool-btn.danger:hover{background:#3a1a1a;border-color:#d45040}
#curve-list-wrap{flex:1;overflow-y:auto;padding:8px}
#curve-list{display:flex;flex-direction:column;gap:6px}
.curve-card{background:#1a222e;border:1px solid #2a3444;border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.curve-card:hover{border-color:#4a5a6a}
.curve-card.selected{border-color:#f0d57a;background:#1e2838}
.curve-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.curve-label{font-size:12px;color:#ddd;flex:1}
.curve-del{color:#5a3030;cursor:pointer;font-size:14px;line-height:1}
.curve-del:hover{color:#d45040}
#shooter-bar{padding:8px 16px;border-top:1px solid #2a3444;display:flex;gap:8px;align-items:center;font-size:11px}
#shooter-bar label{color:#5a6a7a}
#shooter-bar input{width:60px;background:#0e1218;border:1px solid #2a3444;color:#ddd;border-radius:4px;padding:2px 4px;font-size:11px}
#shooter-bar input:focus{border-color:#f0d57a;outline:none}
#export-bar{padding:8px 16px;border-top:1px solid #2a3444;display:flex;gap:6px}
.btn{padding:7px 14px;border-radius:6px;border:1px solid #2a3444;background:#1a222e;color:#ddd;cursor:pointer;font-size:12px;transition:all .15s;text-align:center}
.btn:hover{background:#2a3a50;border-color:#4a5a6a}
.btn.primary{background:#3a5038;border-color:#6a9a64;color:#c0f0b0}
.btn.primary:hover{background:#4a6048}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#080c10;position:relative}
#canvas-wrap canvas{border:1px solid #2a3444;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,0.5);cursor:crosshair}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:#3a4a5a;font-size:11px;pointer-events:none}
#ref-bar{padding:8px 16px;border-top:1px solid #2a3444;display:flex;flex-direction:column;gap:6px}
#ref-bar .ref-head{display:flex;align-items:center;gap:6px;font-size:11px;color:#5a6a7a}
#ref-bar .ref-head .ref-title{flex:1}
#ref-bar .ref-row{display:flex;align-items:center;gap:6px;font-size:11px}
#ref-bar label{color:#5a6a7a;min-width:32px}
#ref-bar input[type=range]{flex:1;height:4px;accent-color:#f0d57a}
#ref-bar .ref-val{color:#8a9aaa;min-width:28px;text-align:right;font-size:10px}
#ref-bar .btn{padding:3px 8px;font-size:11px}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-head">
    <h1>ZUMA 贝塞尔路径编辑器</h1>
    <div class="sub">二次贝塞尔曲线 | 拖拽端点和控制点</div>
    <div class="level-tabs" id="levelTabs"></div>
  </div>

  <div id="toolbar">
    <button class="tool-btn" onclick="addCurve()">＋ 添加曲线</button>
    <button class="tool-btn" id="waypointBtn" onclick="toggleWaypoints()">◎ Waypoint</button>
    <button class="tool-btn" id="brushBtn" onclick="toggleBrush()">✎ 笔刷</button>
    <button class="tool-btn" onclick="smoothJoints()" title="温和模式：只把相邻段接头处的切线对齐，端点/段数不变">≈ 平滑接头</button>
    <button class="tool-btn" onclick="refitPath()" title="全局重拟合：按当前平滑度重新采样整条路径，段数/位置都会变，但整体最顺滑">⟳ 重拟合</button>
    <button class="tool-btn danger" onclick="deleteCurve()">✕ 删除选中</button>
    <button class="tool-btn" onclick="clearAll()">清空</button>
  </div>
  <div id="waypoint-bar" style="display:none;padding:6px 16px;border-bottom:1px solid #2a3444;font-size:11px;color:#8a9aaa">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <button class="tool-btn" onclick="fitWaypoints()" title="按当前 waypoint 骨架一键拟合为二次贝塞尔，误差超限处自动加段">⟳ 一键拟合</button>
      <button class="tool-btn" onclick="extractWaypointsFromCurves()" title="把现有曲线链抽成 waypoint 骨架，方便重新调整拐点">⇄ 从曲线提取</button>
      <button class="tool-btn danger" onclick="deleteWaypoint()">✕ 删除点</button>
      <button class="tool-btn" onclick="clearWaypoints()">清空点</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
      <label>平滑</label>
      <input type="range" id="waypointSmooth" min="1" max="8" value="4" style="flex:1;height:4px;accent-color:#f0d57a">
      <span id="waypointSmoothVal" style="min-width:24px;text-align:right;color:#8a9aaa;font-size:10px">4</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
      <label>误差</label>
      <input type="range" id="waypointError" min="4" max="24" value="10" style="flex:1;height:4px;accent-color:#f0d57a">
      <span id="waypointErrorVal" style="min-width:30px;text-align:right;color:#8a9aaa;font-size:10px">10px</span>
    </div>
    <div id="waypointMeta" style="color:#3a4a5a;font-size:10px;margin-top:4px">Waypoint 模式：点击新增，拖拽调整；靠近折线点击会插入中间点；Delete 删除选中点。</div>
  </div>
  <div id="brush-bar" style="display:none;padding:6px 16px;border-bottom:1px solid #2a3444;font-size:11px;color:#8a9aaa">
    <div style="display:flex;align-items:center;gap:6px">
      <label>平滑</label>
      <input type="range" id="brushSmooth" min="1" max="8" value="4" style="flex:1;height:4px;accent-color:#f0d57a">
      <span id="brushSmoothVal" style="min-width:24px;text-align:right;color:#8a9aaa;font-size:10px">4</span>
    </div>
    <div style="color:#3a4a5a;font-size:10px;margin-top:2px">笔刷模式：在空白处按住拖动画线，松手自动转贝塞尔段。起点靠近上一段终点会自动接续。</div>
  </div>

  <div id="curve-list-wrap">
    <div id="curve-list"></div>
  </div>

  <div id="shooter-bar">
    <label>射手 X:</label><input id="shX" type="number" value="215">
    <label>Y:</label><input id="shY" type="number" value="764">
    <button class="btn" onclick="updateShooter()" style="padding:3px 8px;font-size:11px">应用</button>
  </div>

  <div id="ref-bar">
    <div class="ref-head">
      <span class="ref-title">参考图垫底</span>
      <button class="btn" onclick="uploadRefImage()">上传图片</button>
      <button class="btn" onclick="removeRefImage()" id="refRemoveBtn" disabled>移除</button>
    </div>
    <div class="ref-row">
      <label>透明</label>
      <input type="range" id="refOpacity" min="0" max="100" value="40" oninput="updateRefSettings()">
      <span class="ref-val" id="refOpacityVal">40%</span>
    </div>
    <div class="ref-row">
      <label>缩放</label>
      <input type="range" id="refScale" min="10" max="300" value="100" oninput="updateRefSettings()">
      <span class="ref-val" id="refScaleVal">100%</span>
    </div>
    <div class="ref-row">
      <button class="btn" onclick="resetRefPos()" id="refResetBtn" disabled>重置位置</button>
      <span style="color:#3a4a5a;font-size:10px;flex:1;text-align:right">Alt+拖拽移动图片</span>
    </div>
  </div>

  <div id="export-bar">
    <button class="btn primary" onclick="saveToFile()" style="flex:1">保存到文件</button>
    <button class="btn" onclick="loadFromFile()" style="flex:1">从文件加载</button>
    <button class="btn" onclick="exportLevel()" style="flex:0.6">复制本关</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="cv"></canvas>
  <div id="hint">◎ Waypoint：点击布点后再一键拟合 | 拖拽端点和控制点 | ✎ 笔刷模式直接作画 | Ctrl+滚轮缩放 | 空格+拖拽/中键平移 | Alt+拖拽移动参考图</div>
</div>

<script type="module">
import { GAME_WIDTH, GAME_HEIGHT, TAU, BALL_SPACING } from './config.js';
import {
  fitQuadraticChain,
  resampleByArcLength,
  sampleQuadraticBezier,
  simplifyPolylineRdp,
} from './path-fit.js';

// ─── Color palette for curve segments ───────────────────────────────
const CURVE_COLORS = [
  '#e8645a',
  '#4f9edb',
  '#5dba6a',
  '#e0a83a',
  '#9a63d3',
  '#3dbbaa',
];

// ─── Data model ─────────────────────────────────────────────────────
// Each level: { name, shooterPos:{x,y}, curves:[{p1, cp, p2}, ...], waypoints:[{x,y}, ...], _chainCount }
const CHAIN_COUNTS = [20, 23, 27, 30, 32, 35, 38, 42];
const LEVELS = [];
for (let i = 0; i < 8; i++) {
  LEVELS.push({
    name: `第${i + 1}关`,
    shooterPos: { x: Math.round(GAME_WIDTH * 0.5), y: Math.round(GAME_HEIGHT * 0.82) },
    curves: [],
    waypoints: [],
    _chainCount: CHAIN_COUNTS[i],
    _fitStats: null,
  });
}

let currentLevel = 0;
let selectedCurve = -1;
let selectedWaypoint = -1;

// ─── Canvas state ───────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let scale = 0.5;
let panX = 0, panY = 0;
let dragging = null; // { type:'curve'|'waypoint', ... } or 'shooter'|'pan'|'refImage'|'brush'
let dragStart = null;
let spaceHeld = false;
const SNAP_DISTANCE = 15;
const WAYPOINT_PICK_DISTANCE = 12;
const WAYPOINT_INSERT_DISTANCE = 18;

// ─── Editing mode state ─────────────────────────────────────────────
let waypointMode = false;
let brushMode = false;
let brushSamples = [];
const BRUSH_SAMPLE_MIN_DIST = 6;
const BRUSH_JOIN_DISTANCE = 18;

// ─── Reference image state ─────────────────────────────────────────
let refImage = null;
let refImgX = 0;
let refImgY = 0;
let refImgScale = 1;
let refOpacity = 0.4;

function roundPoint(pt) {
  return { x: Math.round(Number(pt?.x) || 0), y: Math.round(Number(pt?.y) || 0) };
}

function distance(a, b) {
  return Math.hypot((b.x ?? 0) - (a.x ?? 0), (b.y ?? 0) - (a.y ?? 0));
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function dedupePoints(points, minDist = 1) {
  const out = [];
  for (const raw of points || []) {
    const pt = roundPoint(raw);
    if (out.length === 0 || distance(out[out.length - 1], pt) >= minDist) {
      out.push(pt);
    }
  }
  return out;
}

function normalizeCurve(curve) {
  const normalized = {
    p1: roundPoint(curve?.p1 || curve?.points?.[0]),
    cp: roundPoint(curve?.cp || curve?.points?.[1]),
    p2: roundPoint(curve?.p2 || curve?.points?.[2]),
  };
  if (curve?._chunkStart) normalized._chunkStart = true;
  if (curve?._chunkEnd) normalized._chunkEnd = true;
  return normalized;
}

function clearFitStats(level = LEVELS[currentLevel]) {
  level._fitStats = null;
}

function setFitStats(level, kind, stats = {}, extra = {}) {
  level._fitStats = {
    kind,
    segments: stats.segments ?? 0,
    chunks: stats.chunks ?? 0,
    maxError: Number(stats.maxError ?? 0),
    sourcePoints: stats.sourcePoints ?? 0,
    ...extra,
  };
}

function getGuideStart(level) {
  if (level.curves.length > 0) return level.curves[0].p1;
  if (level.waypoints.length > 0) return level.waypoints[0];
  return null;
}

function getGuideEnd(level) {
  if (level.curves.length > 0) return level.curves[level.curves.length - 1].p2;
  if (level.waypoints.length > 0) return level.waypoints[level.waypoints.length - 1];
  return null;
}

function buildWaypointFitConfig() {
  const smoothness = Number(document.getElementById('waypointSmooth').value);
  const errorThreshold = Number(document.getElementById('waypointError').value);
  return {
    smoothness,
    errorThreshold,
    preserveCorners: true,
    densifyStep: 6,
    smoothingPasses: Math.max(0, smoothness - 4),
    tangentRadius: 1 + Math.round(smoothness * 0.6),
    minSpanPoints: 3,
    minSpanLength: 14,
    clampFactor: 1.5,
  };
}

function buildBrushFitConfig(smoothness) {
  return {
    smoothness,
    errorThreshold: 4 + smoothness * 1.25,
    preserveCorners: true,
    densifyStep: 4,
    smoothingPasses: Math.max(1, Math.round(smoothness * 0.75)),
    tangentRadius: 1 + Math.round(smoothness * 0.5),
    minSpanPoints: 4,
    minSpanLength: 12,
    clampFactor: 1.5,
  };
}

function sampleCurveChain(curves, samplesPerCurve = 40) {
  const polyline = [];
  for (let i = 0; i < curves.length; i++) {
    const c = curves[i];
    const pts = sampleQuadraticBezier(c.p1, c.cp, c.p2, samplesPerCurve);
    for (let k = i === 0 ? 0 : 1; k < pts.length; k++) {
      polyline.push(pts[k]);
    }
  }
  return polyline;
}

function fitBrushStrokeToCurves(samples, smoothness) {
  if (samples.length < 2) return { curves: [], stats: null };
  const uniform = resampleByArcLength(samples, 4);
  if (uniform.length < 2) return { curves: [], stats: null };
  return fitQuadraticChain(uniform, buildBrushFitConfig(smoothness));
}

function projectPointToSegment(pt, a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq < 1e-6) {
    return { t: 0, x: a.x, y: a.y, dist: distance(pt, a) };
  }
  const t = Math.max(0, Math.min(1, ((pt.x - a.x) * dx + (pt.y - a.y) * dy) / lenSq));
  const x = a.x + dx * t;
  const y = a.y + dy * t;
  return { t, x, y, dist: Math.hypot(pt.x - x, pt.y - y) };
}

function extractPolylineWaypoints(curves, epsilon) {
  const polyline = sampleCurveChain(curves, 20);
  if (polyline.length < 2) return [];
  const uniform = resampleByArcLength(polyline, 12);
  return dedupePoints(simplifyPolylineRdp(uniform, epsilon), 1);
}

function updateWaypointMeta() {
  const el = document.getElementById('waypointMeta');
  if (!el) return;
  const level = LEVELS[currentLevel];
  if (level.waypoints.length < 1) {
    el.textContent = 'Waypoint 模式：点击新增，拖拽调整；靠近折线点击会插入中间点；Delete 删除选中点。';
    return;
  }

  const parts = [`${level.waypoints.length} 个 waypoint`];
  if (level._fitStats?.segments) parts.push(`拟合 ${level._fitStats.segments} 段`);
  if (level._fitStats?.maxError > 0.05) parts.push(`最大误差 ${level._fitStats.maxError.toFixed(1)}px`);
  if (selectedWaypoint >= 0) parts.push(`当前选中 #${selectedWaypoint + 1}`);
  el.textContent = parts.join(' | ');
}

function setWaypointMode(enabled) {
  waypointMode = enabled;
  if (enabled) {
    brushMode = false;
    brushSamples = [];
    selectedCurve = -1;
    document.getElementById('brushBtn').classList.remove('active');
    document.getElementById('brush-bar').style.display = 'none';
  }
  document.getElementById('waypointBtn').classList.toggle('active', waypointMode);
  document.getElementById('waypoint-bar').style.display = waypointMode ? 'block' : 'none';
  if (!waypointMode) selectedWaypoint = -1;
  buildCurveList();
  updateWaypointMeta();
}

function setBrushMode(enabled) {
  brushMode = enabled;
  if (enabled) {
    waypointMode = false;
    selectedWaypoint = -1;
    document.getElementById('waypointBtn').classList.remove('active');
    document.getElementById('waypoint-bar').style.display = 'none';
  }
  document.getElementById('brushBtn').classList.toggle('active', brushMode);
  document.getElementById('brush-bar').style.display = brushMode ? 'block' : 'none';
  buildCurveList();
  updateWaypointMeta();
}

// ─── Export: curves → control point array ───────────────────────────
function curvesToPointsArray(curves) {
  const arr = [];
  for (const c of curves) {
    arr.push(roundPoint(c.p1));
    arr.push(roundPoint(c.cp));
    arr.push(roundPoint(c.p2));
  }
  return arr;
}

// ─── Render ─────────────────────────────────────────────────────────
function render() {
  const dpr = window.devicePixelRatio || 1;
  const w = cv.width / dpr, h = cv.height / dpr;
  const level = LEVELS[currentLevel];
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#080c10';
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(scale, scale);

  // Game-realistic background (matches render.js drawBackground)
  const canopy = ctx.createLinearGradient(0, 0, 0, 176);
  canopy.addColorStop(0, "#17383e");
  canopy.addColorStop(0.55, "#10272d");
  canopy.addColorStop(1, "#0a1519");
  ctx.fillStyle = canopy;
  ctx.fillRect(0, 0, GAME_WIDTH, 176);

  const slab = ctx.createLinearGradient(0, 118, 0, GAME_HEIGHT);
  slab.addColorStop(0, "#7f8990");
  slab.addColorStop(0.48, "#6e7880");
  slab.addColorStop(1, "#5b646d");
  ctx.fillStyle = slab;
  ctx.fillRect(0, 108, GAME_WIDTH, GAME_HEIGHT - 108);

  // Shooter glow
  const shGlow = LEVELS[currentLevel].shooterPos;
  const glow = ctx.createRadialGradient(shGlow.x + 22, 118, 14, shGlow.x + 22, 118, 268);
  glow.addColorStop(0, "rgba(233, 192, 98, 0.18)");
  glow.addColorStop(1, "rgba(233, 192, 98, 0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // Reference image overlay (rendered below curves, above background)
  if (refImage) {
    ctx.save();
    ctx.globalAlpha = refOpacity;
    ctx.translate(refImgX, refImgY);
    ctx.scale(refImgScale, refImgScale);
    ctx.drawImage(refImage, 0, 0);
    ctx.restore();
  }

  // Subtle grid overlay (for reference, less prominent than before)
  ctx.strokeStyle = 'rgba(42, 52, 68, 0.12)';
  ctx.lineWidth = 0.5 / scale;
  for (let x = 0; x <= GAME_WIDTH; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke();
  }
  for (let y = 0; y <= GAME_HEIGHT; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_WIDTH, y); ctx.stroke();
  }

  // Game area border
  ctx.strokeStyle = 'rgba(60, 70, 84, 0.6)';
  ctx.lineWidth = 1 / scale;
  ctx.strokeRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // HUD top zone (120px) — deeper overlay so it's clear this area is obstructed
  ctx.fillStyle = 'rgba(10, 14, 20, 0.65)';
  ctx.fillRect(0, 0, GAME_WIDTH, 120);
  ctx.strokeStyle = 'rgba(160, 170, 180, 0.6)';
  ctx.lineWidth = 2 / scale;
  ctx.beginPath(); ctx.moveTo(0, 120); ctx.lineTo(GAME_WIDTH, 120); ctx.stroke();
  // HUD label — centered, larger
  ctx.fillStyle = 'rgba(160, 170, 180, 0.7)';
  ctx.font = `bold ${14/scale}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('HUD 区域', GAME_WIDTH / 2, 65);
  ctx.textAlign = 'start';

  // Bottom button zone (70px) — matches actual game button area
  ctx.fillStyle = 'rgba(10, 14, 20, 0.5)';
  ctx.fillRect(0, GAME_HEIGHT - 70, GAME_WIDTH, 70);
  ctx.strokeStyle = 'rgba(160, 170, 180, 0.4)';
  ctx.lineWidth = 1 / scale;
  ctx.beginPath(); ctx.moveTo(0, GAME_HEIGHT - 70); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT - 70); ctx.stroke();
  ctx.fillStyle = 'rgba(160, 170, 180, 0.5)';
  ctx.font = `bold ${12/scale}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('按钮区域', GAME_WIDTH / 2, GAME_HEIGHT - 35);
  ctx.textAlign = 'start';

  // Draw each curve's track — thin clean line for editing
  for (let i = 0; i < level.curves.length; i++) {
    const c = level.curves[i];
    const pts = sampleQuadraticBezier(c.p1, c.cp, c.p2, 50);
    if (pts.length > 1) {
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let j = 1; j < pts.length; j++) ctx.lineTo(pts[j].x, pts[j].y);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.strokeStyle = CURVE_COLORS[i % CURVE_COLORS.length] + '50'; ctx.lineWidth = 3; ctx.stroke();
    }
  }

  if (level.waypoints.length > 0) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (level.waypoints.length > 1) {
      ctx.beginPath();
      ctx.moveTo(level.waypoints[0].x, level.waypoints[0].y);
      for (let i = 1; i < level.waypoints.length; i++) {
        ctx.lineTo(level.waypoints[i].x, level.waypoints[i].y);
      }
      ctx.strokeStyle = waypointMode ? 'rgba(240, 213, 122, 0.92)' : 'rgba(240, 213, 122, 0.35)';
      ctx.lineWidth = waypointMode ? 2.5 / scale : 1.5 / scale;
      ctx.stroke();
    }

    for (let i = 0; i < level.waypoints.length; i++) {
      const pt = level.waypoints[i];
      const isSel = i === selectedWaypoint;
      const r = (isSel ? 9 : 7) / scale;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, r, 0, TAU);
      ctx.fillStyle = isSel ? 'rgba(240, 213, 122, 0.95)' : 'rgba(240, 213, 122, 0.75)';
      ctx.fill();
      ctx.strokeStyle = isSel ? 'rgba(32, 24, 6, 0.95)' : 'rgba(240, 213, 122, 0.35)';
      ctx.lineWidth = 1.5 / scale;
      ctx.stroke();
      if (waypointMode || isSel) {
        ctx.fillStyle = isSel ? 'rgba(255, 247, 212, 0.96)' : 'rgba(240, 213, 122, 0.88)';
        ctx.font = `bold ${9/scale}px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(String(i + 1), pt.x, pt.y - 10 / scale);
        ctx.textAlign = 'start';
        ctx.textBaseline = 'alphabetic';
      }
    }

    ctx.restore();
  }

  // Draw each curve's handles
  for (let i = 0; i < level.curves.length; i++) {
    const c = level.curves[i];
    const col = CURVE_COLORS[i % CURVE_COLORS.length];
    const isSel = i === selectedCurve;

    // Control point lines (dashed) to endpoints
    ctx.setLineDash([4/scale, 3/scale]);
    ctx.strokeStyle = col + '60';
    ctx.lineWidth = 1 / scale;
    ctx.beginPath();
    ctx.moveTo(c.p1.x, c.p1.y);
    ctx.lineTo(c.cp.x, c.cp.y);
    ctx.lineTo(c.p2.x, c.p2.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Endpoints: circles with label (1A = entry, 1B = exit)
    drawEndpoint(c.p1.x, c.p1.y, col, `${i + 1}A`, isSel);
    drawEndpoint(c.p2.x, c.p2.y, col, `${i + 1}B`, isSel);

    // Control point: diamond shape with label
    drawControlPoint(c.cp.x, c.cp.y, col, `C${i + 1}`, isSel);
  }

  // Smoothness indicators at join points
  for (let i = 0; i < level.curves.length - 1; i++) {
    const cA = level.curves[i];
    const cB = level.curves[i + 1];
    // Check if p2 of curve i joins p1 of curve i+1
    if (Math.hypot(cA.p2.x - cB.p1.x, cA.p2.y - cB.p1.y) < SNAP_DISTANCE / scale) {
      const jx = cA.p2.x, jy = cA.p2.y;
      // Check G1: cpA, junction, cpB should be collinear
      const dxA = cA.cp.x - jx, dyA = cA.cp.y - jy;
      const dxB = cB.cp.x - jx, dyB = cB.cp.y - jy;
      const lenA = Math.hypot(dxA, dyA) || 1;
      const lenB = Math.hypot(dxB, dyB) || 1;
      // Dot product of normalized vectors; 1.0 = perfectly aligned
      const dot = (dxA * dxB + dyA * dyB) / (lenA * lenB);
      const isSmooth = dot < -0.95; // nearly opposite direction = collinear
      // Draw indicator circle
      ctx.beginPath(); ctx.arc(jx, jy, 8 / scale, 0, TAU);
      if (isSmooth) {
        ctx.fillStyle = 'rgba(108, 200, 112, 0.25)';
        ctx.strokeStyle = 'rgba(108, 200, 112, 0.7)';
      } else {
        ctx.fillStyle = 'rgba(230, 160, 60, 0.2)';
        ctx.strokeStyle = 'rgba(230, 160, 60, 0.6)';
      }
      ctx.fill(); ctx.lineWidth = 1.5 / scale; ctx.stroke();
      // Small symbol inside
      ctx.font = `bold ${9 / scale}px -apple-system, sans-serif`;
      ctx.fillStyle = isSmooth ? 'rgba(108, 200, 112, 0.9)' : 'rgba(230, 160, 60, 0.8)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(isSmooth ? '∿' : '∠', jx, jy);
      ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
    }
  }

  const guideStart = getGuideStart(level);
  const guideEnd = getGuideEnd(level);

  // Start point marker (green) + entry arrow
  if (guideStart) {
    const first = guideStart;
    ctx.beginPath(); ctx.arc(first.x, first.y, 12, 0, TAU);
    ctx.fillStyle = 'rgba(108, 200, 112, 0.25)'; ctx.fill();
    ctx.strokeStyle = 'rgba(108, 200, 112, 0.6)'; ctx.lineWidth = 1.5/scale; ctx.stroke();
    // Entry arrow (from right side)
    ctx.strokeStyle = 'rgba(108, 200, 112, 0.6)'; ctx.lineWidth = 2/scale;
    const arrX = Math.min(first.x + 50, GAME_WIDTH + 40);
    ctx.beginPath(); ctx.moveTo(arrX, first.y); ctx.lineTo(first.x + 16, first.y); ctx.stroke();
    // Arrow head
    ctx.beginPath();
    ctx.moveTo(first.x + 16, first.y);
    ctx.lineTo(first.x + 24, first.y - 5);
    ctx.moveTo(first.x + 16, first.y);
    ctx.lineTo(first.x + 24, first.y + 5);
    ctx.stroke();
    // Label
    ctx.fillStyle = 'rgba(108, 200, 112, 0.8)';
    ctx.font = `bold ${11/scale}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('入口', Math.min(first.x + 55, GAME_WIDTH - 20), first.y - 10);
    ctx.textAlign = 'start';
  }

  // End point marker (red) + goal label
  if (guideEnd) {
    const last = guideEnd;
    ctx.beginPath(); ctx.arc(last.x, last.y, 12, 0, TAU);
    ctx.fillStyle = 'rgba(212, 80, 64, 0.25)'; ctx.fill();
    ctx.strokeStyle = 'rgba(212, 80, 64, 0.6)'; ctx.lineWidth = 1.5/scale; ctx.stroke();
    // Label
    ctx.fillStyle = 'rgba(212, 80, 64, 0.8)';
    ctx.font = `bold ${11/scale}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('终点', last.x, last.y - 18);
    ctx.textAlign = 'start';
  }

  // Shooter — larger zone matching actual frog size, with crosshair
  const sh = level.shooterPos;
  // Outer zone (frog body ~50px radius)
  ctx.beginPath(); ctx.arc(sh.x, sh.y, 50, 0, TAU);
  ctx.fillStyle = 'rgba(233, 192, 98, 0.08)'; ctx.fill();
  ctx.strokeStyle = 'rgba(233, 192, 98, 0.35)'; ctx.lineWidth = 1.5/scale; ctx.stroke();
  // Inner aim zone
  ctx.beginPath(); ctx.arc(sh.x, sh.y, 30, 0, TAU);
  ctx.strokeStyle = 'rgba(233, 192, 98, 0.2)'; ctx.lineWidth = 1/scale; ctx.stroke();
  // Crosshair lines
  ctx.strokeStyle = 'rgba(233, 192, 98, 0.25)'; ctx.lineWidth = 1/scale;
  ctx.beginPath(); ctx.moveTo(sh.x - 20, sh.y); ctx.lineTo(sh.x + 20, sh.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sh.x, sh.y - 20); ctx.lineTo(sh.x, sh.y + 20); ctx.stroke();
  // Center dot
  ctx.beginPath(); ctx.arc(sh.x, sh.y, 6, 0, TAU);
  ctx.fillStyle = '#f0d57a'; ctx.fill();
  // Label
  ctx.fillStyle = 'rgba(240, 213, 122, 0.7)';
  ctx.font = `bold ${11/scale}px -apple-system, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('射手', sh.x, sh.y + 40);
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';

  // Brush preview — live trail while the user is drawing a freehand stroke.
  // We render the raw sample polyline so what you see follows the pointer
  // exactly; the simplification + Bezier fit only happens on mouseup.
  if (brushMode && brushSamples.length >= 2) {
    ctx.save();
    ctx.strokeStyle = 'rgba(240, 213, 122, 0.9)';
    ctx.lineWidth = 3 / scale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(brushSamples[0].x, brushSamples[0].y);
    for (let i = 1; i < brushSamples.length; i++) {
      ctx.lineTo(brushSamples[i].x, brushSamples[i].y);
    }
    ctx.stroke();
    // Start dot — so the user can see where the stroke anchored
    ctx.beginPath();
    ctx.arc(brushSamples[0].x, brushSamples[0].y, 4 / scale, 0, TAU);
    ctx.fillStyle = 'rgba(240, 213, 122, 0.8)';
    ctx.fill();
    ctx.restore();
  }

  // Path length info — with background bar for readability
  let pathLen = 0;
  for (const c of level.curves) {
    const pts = sampleQuadraticBezier(c.p1, c.cp, c.p2, 50);
    for (let i = 1; i < pts.length; i++) pathLen += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
  }
  const chainLen = (level._chainCount || 20) * BALL_SPACING;
  const remaining = pathLen - chainLen;
  const infoY = GAME_HEIGHT - 85;
  // Background bar
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, infoY - 4, GAME_WIDTH, 18);
  // Text
  ctx.fillStyle = remaining < 0 ? 'rgba(212, 80, 64, 0.9)' : 'rgba(200, 215, 225, 0.85)';
  ctx.font = `bold ${13/scale}px -apple-system, sans-serif`;
  const fitInfo = level._fitStats?.segments ? `  |  拟合误差: ${level._fitStats.maxError.toFixed(1)}px` : '';
  const waypointInfo = level.waypoints.length > 0 ? `  |  点: ${level.waypoints.length}` : '';
  const pathInfo = `路径: ${Math.round(pathLen)}px  |  球链: ${Math.round(chainLen)}px  |  剩余: ${Math.round(remaining)}px  |  曲线: ${level.curves.length}段${waypointInfo}${fitInfo}`;
  ctx.fillText(pathInfo, 8, infoY + 8);

  ctx.restore();
}

function drawEndpoint(x, y, color, label, isSel) {
  const r = (isSel ? 11 : 9) / scale;

  // Filled circle
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU);
  ctx.fillStyle = color + '30'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5/scale; ctx.stroke();

  // Label inside (e.g. "1A", "1B")
  ctx.fillStyle = color;
  ctx.font = `bold ${(isSel ? 10 : 8)/scale}px -apple-system, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

function drawControlPoint(x, y, color, label, isSel) {
  const s = (isSel ? 9 : 7) / scale;

  // Diamond shape
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x + s, y);
  ctx.lineTo(x, y + s);
  ctx.lineTo(x - s, y);
  ctx.closePath();
  ctx.fillStyle = color + '40'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5/scale; ctx.stroke();

  // Label next to it (e.g. "C1", "C2")
  ctx.fillStyle = color;
  ctx.font = `bold ${(isSel ? 9 : 8)/scale}px -apple-system, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + s + 3/scale, y);
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

// ─── Canvas interaction ─────────────────────────────────────────────
function screenToGame(sx, sy) {
  return {
    x: (sx - panX) / scale,
    y: (sy - panY) / scale,
  };
}

function isTextInputFocused() {
  const el = document.activeElement;
  if (!el) return false;
  const tag = el.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
}

function findWaypointHandle(gx, gy) {
  const level = LEVELS[currentLevel];
  const threshold = WAYPOINT_PICK_DISTANCE / scale;
  for (let i = level.waypoints.length - 1; i >= 0; i--) {
    const pt = level.waypoints[i];
    if (Math.hypot(gx - pt.x, gy - pt.y) < threshold) {
      return { type: 'waypoint', index: i };
    }
  }
  return null;
}

function findWaypointInsertion(gx, gy) {
  const level = LEVELS[currentLevel];
  if (level.waypoints.length < 2) return null;

  let best = null;
  let bestDist = WAYPOINT_INSERT_DISTANCE / scale;
  const probe = { x: gx, y: gy };

  for (let i = 0; i < level.waypoints.length - 1; i++) {
    const proj = projectPointToSegment(probe, level.waypoints[i], level.waypoints[i + 1]);
    if (proj.dist < bestDist) {
      bestDist = proj.dist;
      best = { insertIndex: i + 1, point: roundPoint(proj) };
    }
  }
  return best;
}

function insertWaypoint(insertIndex, pt) {
  const level = LEVELS[currentLevel];
  const point = roundPoint(pt);
  level.waypoints.splice(insertIndex, 0, point);
  selectedWaypoint = insertIndex;
  buildCurveList();
  clearFitStats(level);
  updateWaypointMeta();
  return insertIndex;
}

function appendWaypointSmart(pt) {
  const level = LEVELS[currentLevel];
  const point = roundPoint(pt);
  let index = level.waypoints.length;

  if (level.waypoints.length === 0) {
    level.waypoints.push(point);
    index = 0;
  } else {
    const firstDist = distance(point, level.waypoints[0]);
    const lastDist = distance(point, level.waypoints[level.waypoints.length - 1]);
    if (firstDist + 24 < lastDist) {
      level.waypoints.unshift(point);
      index = 0;
    } else {
      level.waypoints.push(point);
      index = level.waypoints.length - 1;
    }
  }

  selectedWaypoint = index;
  buildCurveList();
  clearFitStats(level);
  updateWaypointMeta();
  return index;
}

function findHandle(gx, gy) {
  const level = LEVELS[currentLevel];
  const threshold = 14 / scale;

  // Check shooter
  if (Math.hypot(gx - level.shooterPos.x, gy - level.shooterPos.y) < threshold) {
    return { type: 'shooter' };
  }

  // Check curve handles (reverse order so top-most is picked first)
  for (let i = level.curves.length - 1; i >= 0; i--) {
    const c = level.curves[i];
    if (Math.hypot(gx - c.cp.x, gy - c.cp.y) < threshold) return { type: 'curve', index: i, point: 'cp' };
    if (Math.hypot(gx - c.p2.x, gy - c.p2.y) < threshold) return { type: 'curve', index: i, point: 'p2' };
    if (Math.hypot(gx - c.p1.x, gy - c.p1.y) < threshold) return { type: 'curve', index: i, point: 'p1' };
  }
  return null;
}

// Find the closest endpoint from other curves for snapping
function findSnapTarget(curveIndex, pointType, gx, gy) {
  const level = LEVELS[currentLevel];
  let bestDist = SNAP_DISTANCE / scale;
  let bestPoint = null;

  for (let i = 0; i < level.curves.length; i++) {
    if (i === curveIndex) continue;
    const c = level.curves[i];
    // Check both endpoints of each curve
    for (const pt of ['p1', 'p2']) {
      const d = Math.hypot(gx - c[pt].x, gy - c[pt].y);
      if (d < bestDist) {
        bestDist = d;
        bestPoint = { curveIndex: i, point: pt, x: c[pt].x, y: c[pt].y };
      }
    }
  }
  return bestPoint;
}

// Check if an endpoint of a curve is joined with an endpoint of another curve.
// Returns { curveIndex, point } or null.
function findJoinNeighbor(curveIndex, pointType) {
  const level = LEVELS[currentLevel];
  const c = level.curves[curveIndex];
  const pt = c[pointType];
  for (let i = 0; i < level.curves.length; i++) {
    if (i === curveIndex) continue;
    const other = level.curves[i];
    for (const otherPt of ['p1', 'p2']) {
      if (Math.hypot(pt.x - other[otherPt].x, pt.y - other[otherPt].y) < SNAP_DISTANCE / scale) {
        return { curveIndex: i, point: otherPt };
      }
    }
  }
  return null;
}

// Mirror targetCp across junctionPt to be symmetric with sourceCp.
// Ensures G1 continuity (collinear + equal distance).
function mirrorControlPoint(junctionPt, sourceCp, targetCp) {
  const dx = sourceCp.x - junctionPt.x;
  const dy = sourceCp.y - junctionPt.y;
  targetCp.x = Math.round(junctionPt.x - dx);
  targetCp.y = Math.round(junctionPt.y - dy);
}

function smoothCurveChainJoints(curves, tolerance = SNAP_DISTANCE / scale) {
  let fixed = 0;

  for (let i = 0; i < curves.length - 1; i++) {
    const a = curves[i];
    const b = curves[i + 1];
    if (a._chunkEnd || b._chunkStart) continue;
    const gap = Math.hypot(a.p2.x - b.p1.x, a.p2.y - b.p1.y);
    if (gap > tolerance) continue;

    const jx = (a.p2.x + b.p1.x) * 0.5;
    const jy = (a.p2.y + b.p1.y) * 0.5;
    a.p2.x = Math.round(jx); a.p2.y = Math.round(jy);
    b.p1.x = Math.round(jx); b.p1.y = Math.round(jy);

    const inChordX = jx - a.p1.x;
    const inChordY = jy - a.p1.y;
    const outChordX = b.p2.x - jx;
    const outChordY = b.p2.y - jy;
    const inChordLen = Math.hypot(inChordX, inChordY) || 1;
    const outChordLen = Math.hypot(outChordX, outChordY) || 1;
    const chordIn = { x: inChordX / inChordLen, y: inChordY / inChordLen };
    const chordOut = { x: outChordX / outChordLen, y: outChordY / outChordLen };

    let inX = jx - a.cp.x;
    let inY = jy - a.cp.y;
    let outX = b.cp.x - jx;
    let outY = b.cp.y - jy;
    let inLen = Math.hypot(inX, inY);
    let outLen = Math.hypot(outX, outY);

    if (inLen < 1e-4) {
      inX = chordIn.x;
      inY = chordIn.y;
      inLen = Math.max(8, inChordLen * 0.28);
    } else {
      inX /= inLen;
      inY /= inLen;
    }

    if (outLen < 1e-4) {
      outX = chordOut.x;
      outY = chordOut.y;
      outLen = Math.max(8, outChordLen * 0.28);
    } else {
      outX /= outLen;
      outY /= outLen;
    }

    let tx = inX + outX;
    let ty = inY + outY;
    let tLen = Math.hypot(tx, ty);
    if (tLen < 1e-4) {
      tx = chordIn.x + chordOut.x;
      ty = chordIn.y + chordOut.y;
      tLen = Math.hypot(tx, ty);
    }
    if (tLen < 1e-4) {
      tx = outChordLen >= inChordLen ? chordOut.x : chordIn.x;
      ty = outChordLen >= inChordLen ? chordOut.y : chordIn.y;
      tLen = 1;
    }
    tx /= tLen;
    ty /= tLen;

    const minIn = Math.max(8, inChordLen * 0.22);
    const minOut = Math.max(8, outChordLen * 0.22);
    const maxIn = Math.max(minIn, inChordLen * 0.75);
    const maxOut = Math.max(minOut, outChordLen * 0.75);
    inLen = clamp(inLen, minIn, maxIn);
    outLen = clamp(outLen, minOut, maxOut);

    a.cp.x = Math.round(jx - tx * inLen);
    a.cp.y = Math.round(jy - ty * inLen);
    b.cp.x = Math.round(jx + tx * outLen);
    b.cp.y = Math.round(jy + ty * outLen);
    fixed++;
  }

  for (const c of curves) {
    c.p1 = roundPoint(c.p1);
    c.cp = roundPoint(c.cp);
    c.p2 = roundPoint(c.p2);
    delete c._chunkStart;
    delete c._chunkEnd;
  }

  return fixed;
}

function updateCanvasCursor() {
  if (spaceHeld) {
    cv.style.cursor = dragging === 'pan' ? 'grabbing' : 'grab';
  } else if (brushMode || waypointMode) {
    cv.style.cursor = 'crosshair';
  } else {
    cv.style.cursor = 'crosshair';
  }
}

window.addEventListener('keydown', e => {
  if (isTextInputFocused()) return;
  if (e.code === 'Space' && !e.repeat) { spaceHeld = true; updateCanvasCursor(); }
  if (e.code === 'Escape' && brushMode) { window.toggleBrush(); }
  if (e.code === 'Escape' && waypointMode) { window.toggleWaypoints(); }
  if ((e.code === 'Delete' || e.code === 'Backspace') && waypointMode && selectedWaypoint >= 0) {
    e.preventDefault();
    window.deleteWaypoint();
  }
  if ((e.code === 'Delete' || e.code === 'Backspace') && !waypointMode && !brushMode && selectedCurve >= 0) {
    e.preventDefault();
    window.deleteCurve();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceHeld = false; updateCanvasCursor(); }
});

cv.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && spaceHeld)) {
    dragging = 'pan';
    dragStart = { x: e.offsetX, y: e.offsetY, panX, panY };
    cv.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }
  // Alt+click to drag reference image
  if (e.altKey && refImage) {
    dragging = 'refImage';
    dragStart = { x: e.offsetX, y: e.offsetY, refImgX, refImgY };
    e.preventDefault();
    return;
  }
  // Brush mode: start a freehand stroke. Ignores handle hits so an
  // accidental pass over an existing endpoint doesn't hijack the stroke.
  if (brushMode && e.button === 0) {
    const g = screenToGame(e.offsetX, e.offsetY);
    dragging = 'brush';
    brushSamples = [{ x: g.x, y: g.y }];
    e.preventDefault();
    render();
    return;
  }
  const g = screenToGame(e.offsetX, e.offsetY);

  if (waypointMode && e.button === 0) {
    selectedCurve = -1;
    const wp = findWaypointHandle(g.x, g.y);
    if (wp) {
      dragging = wp;
      selectedWaypoint = wp.index;
      updateWaypointMeta();
      render();
      return;
    }

    const insertion = findWaypointInsertion(g.x, g.y);
    if (insertion) {
      const index = insertWaypoint(insertion.insertIndex, insertion.point);
      dragging = { type: 'waypoint', index };
      render();
      return;
    }

    const index = appendWaypointSmart(g);
    dragging = { type: 'waypoint', index };
    render();
    return;
  }

  const handle = findHandle(g.x, g.y);
  if (handle) {
    dragging = handle;
    if (handle.type === 'curve') selectedCurve = handle.index;
    if (handle.type !== 'curve') selectedCurve = -1;
    selectedWaypoint = -1;
  } else {
    selectedCurve = -1;
    selectedWaypoint = -1;
  }
  buildCurveList();
  updateWaypointMeta();
  render();
});

cv.addEventListener('mousemove', e => {
  if (!dragging) return;
  const g = screenToGame(e.offsetX, e.offsetY);

  if (dragging === 'pan') {
    panX = dragStart.panX + (e.offsetX - dragStart.x);
    panY = dragStart.panY + (e.offsetY - dragStart.y);
    render();
    return;
  }

  if (dragging === 'refImage') {
    const dx = (e.offsetX - dragStart.x) / scale;
    const dy = (e.offsetY - dragStart.y) / scale;
    refImgX = dragStart.refImgX + dx;
    refImgY = dragStart.refImgY + dy;
    render();
    return;
  }

  if (dragging === 'brush') {
    const last = brushSamples[brushSamples.length - 1];
    const dx = g.x - last.x, dy = g.y - last.y;
    if (dx * dx + dy * dy >= BRUSH_SAMPLE_MIN_DIST * BRUSH_SAMPLE_MIN_DIST) {
      brushSamples.push({ x: g.x, y: g.y });
      render();
    }
    return;
  }

  const level = LEVELS[currentLevel];

  if (dragging.type === 'shooter') {
    level.shooterPos.x = Math.round(Math.max(0, Math.min(GAME_WIDTH, g.x)));
    level.shooterPos.y = Math.round(Math.max(0, Math.min(GAME_HEIGHT, g.y)));
    document.getElementById('shX').value = level.shooterPos.x;
    document.getElementById('shY').value = level.shooterPos.y;
  } else if (dragging.type === 'waypoint') {
    const pt = level.waypoints[dragging.index];
    if (pt) {
      pt.x = Math.round(g.x);
      pt.y = Math.round(g.y);
      selectedWaypoint = dragging.index;
      clearFitStats(level);
      updateWaypointMeta();
    }
  } else if (dragging.type === 'curve') {
    const { index, point } = dragging;
    const c = level.curves[index];
    let newX = Math.round(g.x);
    let newY = Math.round(g.y);

    if (point === 'p1' || point === 'p2') {
      const snap = findSnapTarget(index, point, newX, newY);
      if (snap) {
        newX = snap.x;
        newY = snap.y;
      }

      c[point].x = newX;
      c[point].y = newY;

      // Sync joined endpoints and auto-mirror control points for G1 continuity
      const join = findJoinNeighbor(index, point);
      if (join) {
        const neighborCurve = level.curves[join.curveIndex];
        // Sync endpoint position
        neighborCurve[join.point].x = newX;
        neighborCurve[join.point].y = newY;
        // Mirror: current curve's cp → neighbor's cp across the junction
        mirrorControlPoint(c[point], c.cp, neighborCurve.cp);
      }
    } else {
      // Dragging control point (cp)
      c.cp.x = newX;
      c.cp.y = newY;

      // Auto-mirror: check if p1 side is joined → mirror neighbor's cp across p1
      const joinP1 = findJoinNeighbor(index, 'p1');
      if (joinP1) {
        mirrorControlPoint(c.p1, c.cp, level.curves[joinP1.curveIndex].cp);
      }

      // Check if p2 side is joined → mirror neighbor's cp across p2
      const joinP2 = findJoinNeighbor(index, 'p2');
      if (joinP2) {
        mirrorControlPoint(c.p2, c.cp, level.curves[joinP2.curveIndex].cp);
      }
    }
    clearFitStats(level);
    updateWaypointMeta();
  }
  render();
});

cv.addEventListener('mouseup', () => {
  if (dragging === 'brush') {
    finalizeBrushStroke();
  }
  dragging = null;
  updateCanvasCursor();
});
cv.addEventListener('mouseleave', () => {
  if (dragging === 'brush') {
    finalizeBrushStroke();
  }
  dragging = null;
  updateCanvasCursor();
});

// Convert the in-progress brush trail into quadratic Bezier curves and
// append them to the current level. If the stroke's first sample is close
// to the last curve's p2, the stroke's start point snaps to it so the
// editor's existing join-detection picks up G1 continuity automatically.
function finalizeBrushStroke() {
  const samples = brushSamples;
  brushSamples = [];
  if (samples.length < 2) {
    render();
    return;
  }
  const level = LEVELS[currentLevel];
  let joinedToExisting = false;

  // Snap stroke start to the last curve's p2 if nearby, so new strokes
  // continue naturally from existing paths.
  if (level.curves.length > 0) {
    const lastP2 = level.curves[level.curves.length - 1].p2;
    const dx = samples[0].x - lastP2.x, dy = samples[0].y - lastP2.y;
    if (Math.hypot(dx, dy) <= BRUSH_JOIN_DISTANCE) {
      samples[0] = { x: lastP2.x, y: lastP2.y };
      joinedToExisting = true;
    }
  }

  const smoothness = Number(document.getElementById('brushSmooth').value);
  const result = fitBrushStrokeToCurves(samples, smoothness);
  const newCurves = result.curves.map(normalizeCurve);
  if (joinedToExisting && newCurves.length > 0) delete newCurves[0]._chunkStart;
  if (newCurves.length === 0) {
    render();
    return;
  }

  level.curves.push(...newCurves);
  smoothCurveChainJoints(level.curves);
  if (level.waypoints.length === 0) {
    level.waypoints = extractPolylineWaypoints(level.curves, 12);
  }
  setFitStats(level, 'brush', result.stats, { smoothness });
  selectedCurve = level.curves.length - 1;
  buildCurveList();
  updateWaypointMeta();
  render();
}

cv.addEventListener('wheel', e => {
  e.preventDefault();

  if (e.ctrlKey) {
    // Ctrl+scroll or pinch-to-zoom: zoom in/out
    const step = Math.min(Math.abs(e.deltaY), 200) / 200;
    const direction = e.deltaY > 0 ? -1 : 1;
    const factor = 1 + direction * step * 0.08;
    const mx = e.offsetX, my = e.offsetY;
    panX = mx - (mx - panX) * factor;
    panY = my - (my - panY) * factor;
    scale *= factor;
    scale = Math.max(0.2, Math.min(2, scale));
  } else {
    // Regular scroll: pan the canvas
    panX -= e.deltaX;
    panY -= e.deltaY;
  }
  render();
}, { passive: false });

// Walk the curve chain and enforce G1 continuity at every joint where
// one curve's p2 coincides (within SNAP_DISTANCE) with the next curve's
// p1. At each such joint we replace the two neighboring control points
// with ones that share a common tangent direction, while preserving each
// side's original "handle length" (distance from joint to its cp) so the
// overall shape stays close to the author's intent — only the kink at
// the joint disappears.
window.smoothJoints = function() {
  const level = LEVELS[currentLevel];
  if (level.curves.length < 2) return;
  const fixed = smoothCurveChainJoints(level.curves);

  if (fixed > 0) {
    buildCurveList();
    clearFitStats(level);
    updateWaypointMeta();
    render();
  }
};

// Global refit: resample the entire curve chain into a dense polyline,
// then push it back through the same fitter the brush uses. The result
// is a fresh chain of quadratics with uniformly spaced anchors, globally
// estimated tangents, and tangent-intersection control points — every
// joint is automatically G1, segment lengths are even, and the visible
// "bumps" from uneven handle lengths in the old chain disappear.
//
// Tradeoffs vs the per-joint smoother: this changes segment count,
// anchor positions, and selection index. It's the right tool when the
// path's shape is close to what you want but the individual segments
// feel choppy; use the gentler smoothJoints when you want to preserve
// current anchors exactly.
window.refitPath = function() {
  const level = LEVELS[currentLevel];
  if (level.curves.length < 1) return;

  // Only consider contiguous runs — segments that actually chain p2→p1
  // form one polyline, and gaps start a new polyline. This way an author
  // who drew two disjoint arcs doesn't have them fused into one snake.
  const tol = SNAP_DISTANCE / scale;
  const runs = [[level.curves[0]]];
  for (let i = 1; i < level.curves.length; i++) {
    const prev = level.curves[i - 1];
    const curr = level.curves[i];
    const dx = prev.p2.x - curr.p1.x, dy = prev.p2.y - curr.p1.y;
    if (Math.hypot(dx, dy) <= tol) {
      runs[runs.length - 1].push(curr);
    } else {
      runs.push([curr]);
    }
  }

  // Dense sample each run into a polyline, then re-fit via the shared
  // brush pipeline. Sampling density matches what finalizePath uses on
  // the game side, so the editor preview matches runtime geometry.
  const smoothness = Number(document.getElementById('brushSmooth').value);
  const newCurves = [];
  let maxError = 0;
  let chunkCount = 0;
  for (const run of runs) {
    const polyline = [];
    for (let i = 0; i < run.length; i++) {
      const c = run[i];
      const pts = sampleQuadraticBezier(c.p1, c.cp, c.p2, 40);
      // Drop the first point on every segment after the first to avoid
      // duplicating the shared joint vertex.
      for (let k = (i === 0 ? 0 : 1); k < pts.length; k++) {
        polyline.push(pts[k]);
      }
    }
    if (polyline.length < 2) continue;
    const fitted = fitQuadraticChain(polyline, buildBrushFitConfig(smoothness));
    if (fitted.curves.length > 0) {
      newCurves.push(...fitted.curves.map(normalizeCurve));
      maxError = Math.max(maxError, fitted.stats?.maxError || 0);
      chunkCount += fitted.stats?.chunks || 1;
    }
  }

  if (newCurves.length === 0) return;
  level.curves = newCurves;
  smoothCurveChainJoints(level.curves);
  level.waypoints = extractPolylineWaypoints(level.curves, Number(document.getElementById('waypointError').value) * 1.15);
  setFitStats(level, 'refit', {
    segments: newCurves.length,
    chunks: chunkCount || runs.length,
    maxError,
    sourcePoints: level.waypoints.length,
  }, { smoothness });
  selectedCurve = level.curves.length - 1;
  buildCurveList();
  updateWaypointMeta();
  render();
};

    card.onclick = () => {

    card.appendChild(label);
    card.appendChild(del);

}

// ─── Save / Load ────────────────────────────────────────────────────
const LEVEL_FILE = 'level-paths.json';
let fileHandle = null; // File System Access API handle

function levelsToJson() {
  return JSON.stringify(LEVELS.map((lv, i) => ({
    name: lv.name,
    curves: lv.curves.map(c => ({
      p1: { x: Math.round(c.p1.x), y: Math.round(c.p1.y) },
      cp: { x: Math.round(c.cp.x), y: Math.round(c.cp.y) },
      p2: { x: Math.round(c.p2.x), y: Math.round(c.p2.y) },
    })),
    waypoints: lv.waypoints.map(pt => ({ x: Math.round(pt.x), y: Math.round(pt.y) })),
    shooterPos: lv.shooterPos,
  })), null, 2);
}

function loadLevelsFromData(data) {
  for (let i = 0; i < Math.min(data.length, LEVELS.length); i++) {
    LEVELS[i].name = data[i].name || LEVELS[i].name;
    LEVELS[i].curves = (data[i].curves || []).map(normalizeCurve);
    LEVELS[i].waypoints = dedupePoints(data[i].waypoints || extractPolylineWaypoints(LEVELS[i].curves, 12), 1);
    LEVELS[i].shooterPos = data[i].shooterPos || LEVELS[i].shooterPos;
    clearFitStats(LEVELS[i]);
  }
}

window.saveToFile = async function() {
  const json = levelsToJson();
  // Try File System Access API (allows overwriting the same file)
  if (window.showSaveFilePicker) {
    try {
      if (!fileHandle) {
        fileHandle = await window.showSaveFilePicker({
          suggestedName: LEVEL_FILE,
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
        });
      }
      const writable = await fileHandle.createWritable();
      await writable.write(json);
      await writable.close();
      alert('已保存到 ' + fileHandle.name);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      fileHandle = null; // reset handle on error
    }
  }
  // Fallback: download as file
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = LEVEL_FILE; a.click();
  URL.revokeObjectURL(url);
};

window.loadFromFile = async function() {
  // Try File System Access API
  if (window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      });
      fileHandle = handle;
      const file = await handle.getFile();
      const text = await file.text();
      loadLevelsFromData(JSON.parse(text));
      selectedCurve = -1;
      selectedWaypoint = -1;
      const sh = LEVELS[currentLevel].shooterPos;
      document.getElementById('shX').value = sh.x;
      document.getElementById('shY').value = sh.y;
      buildCurveList();
      updateWaypointMeta();
      render();
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  // Fallback: file input
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async () => {
    const text = await input.files[0].text();
    loadLevelsFromData(JSON.parse(text));
    selectedCurve = -1;
    selectedWaypoint = -1;
    const sh = LEVELS[currentLevel].shooterPos;
    document.getElementById('shX').value = sh.x;
    document.getElementById('shY').value = sh.y;
    buildCurveList();
    updateWaypointMeta();
    render();
  };
  input.click();
};

window.exportLevel = function() {
  const level = LEVELS[currentLevel];
  const pointsArr = curvesToPointsArray(level.curves);
  navigator.clipboard.writeText(JSON.stringify(pointsArr, null, 2)).then(() => {
    alert(`已复制第${currentLevel+1}关控制点数组到剪贴板！\n\n共 ${pointsArr.length} 个点，${level.curves.length} 段曲线`);

};

// ─── Reference image ────────────────────────────────────────────────
window.uploadRefImage = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      refImage = img;
      // Default: fit image into game area, centered
      const scaleX = GAME_WIDTH / img.naturalWidth;
      const scaleY = GAME_HEIGHT / img.naturalHeight;
      refImgScale = Math.min(scaleX, scaleY);
      refImgX = (GAME_WIDTH - img.naturalWidth * refImgScale) / 2;
      refImgY = (GAME_HEIGHT - img.naturalHeight * refImgScale) / 2;
      // Update UI
      document.getElementById('refScale').value = Math.round(refImgScale * 100);
      document.getElementById('refScaleVal').textContent = Math.round(refImgScale * 100) + '%';
      document.getElementById('refRemoveBtn').disabled = false;
      document.getElementById('refResetBtn').disabled = false;
      render();
    };
    img.src = url;
  };
  input.click();
};

window.removeRefImage = function() {
  refImage = null;
  refImgX = 0;
  refImgY = 0;
  refImgScale = 1;
  document.getElementById('refRemoveBtn').disabled = true;
  document.getElementById('refResetBtn').disabled = true;
  render();
};

  if (!refImage) return;
  const scaleX = GAME_WIDTH / refImage.naturalWidth;
  const scaleY = GAME_HEIGHT / refImage.naturalHeight;
  refImgScale = Math.min(scaleX, scaleY);
  refImgX = (GAME_WIDTH - refImage.naturalWidth * refImgScale) / 2;
  refImgY = (GAME_HEIGHT - refImage.naturalHeight * refImgScale) / 2;
  document.getElementById('refScale').value = Math.round(refImgScale * 100);
  document.getElementById('refScaleVal').textContent = Math.round(refImgScale * 100) + '%';

};

// ─── Canvas setup ───────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth - 40;
  const h = wrap.clientHeight - 40;
  cv.width = w * dpr;
  cv.height = h * dpr;
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  // Center the game area in the canvas
  panX = (w - GAME_WIDTH * scale) / 2;
  panY = (h - GAME_HEIGHT * scale) / 2;
  render();
}

window.addEventListener('resize', resizeCanvas);

// Init: try to load from level-paths.json automatically
async function init() {
  const url = './level-paths.json?t=' + Date.now();
  try {
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      loadLevelsFromData(data);
    }
  } catch (e) {
    // ignore
  }
  document.getElementById('shX').value = LEVELS[currentLevel].shooterPos.x;
  document.getElementById('shY').value = LEVELS[currentLevel].shooterPos.y;
  document.getElementById('brushSmoothVal').textContent = document.getElementById('brushSmooth').value;
  document.getElementById('waypointSmoothVal').textContent = document.getElementById('waypointSmooth').value;
  document.getElementById('waypointErrorVal').textContent = `${document.getElementById('waypointError').value}px`;
  buildCurveList();
  updateWaypointMeta();
  resizeCanvas();
}
init();
</script>
